<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>kovr quote mockup 3</title><style>body{margin:0;background:#efefef;font-family:Inter,Arial,sans-serif;color:#111}.frame{width:1200px;height:1500px;margin:0 auto;background:radial-gradient(circle at top right,#d9d9d9,#efefef 46%,#e7e7e7);display:flex;align-items:center;justify-content:center;position:relative}.tee{width:760px;height:980px;background:#1b1b1b;border-radius:120px 120px 80px 80px;position:relative;box-shadow:0 32px 90px rgba(0,0,0,.2)}.tee:before,.tee:after{content:'';position:absolute;top:120px;width:180px;height:240px;background:#1b1b1b;border-radius:90px}.tee:before{left:-115px;transform:rotate(30deg)}.tee:after{right:-115px;transform:rotate(-30deg)}.neck{position:absolute;top:0;left:50%;transform:translateX(-50%);width:220px;height:110px;background:#efefef;border-radius:0 0 100px 100px}.quote{position:absolute;left:105px;right:105px;top:310px;text-align:center;color:#fff;font-weight:800;font-size:66px;line-height:1.18;letter-spacing:.12em;text-transform:uppercase}.binary{position:absolute;left:96px;right:96px;top:670px;text-align:center;color:#7a7a7a;font-size:22px;letter-spacing:.5em}.brand{position:absolute;bottom:126px;left:0;right:0;text-align:center;color:#ff7e79;font-size:36px;letter-spacing:.45em;text-transform:uppercase}.sleeve{position:absolute;right:44px;top:420px;color:#7a7a7a;font-size:18px;letter-spacing:.28em;transform:rotate(90deg)}</style></head><body><div class="frame"><div class="tee"><div class="neck"></div><div class="quote">There are 10<br>types of people.<br>Those who understand binary<br>and those who don't.</div><div class="binary">101010 001101 101101</div><div class="sleeve">BINARY DETAIL</div><div class="brand">kovr</div></div></div></body></html>
