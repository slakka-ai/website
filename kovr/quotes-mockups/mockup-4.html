<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>kovr quote mockup 4</title><style>body{margin:0;background:#fbf6f2;font-family:Inter,Arial,sans-serif;color:#111}.frame{width:1200px;height:1500px;margin:0 auto;background:linear-gradient(180deg,#fbf6f2,#f1e9e2);display:flex;align-items:center;justify-content:center;position:relative}.tee{width:760px;height:980px;background:#fff;border-radius:120px 120px 80px 80px;position:relative;box-shadow:0 32px 100px rgba(0,0,0,.12);border:1px solid rgba(0,0,0,.08)}.tee:before,.tee:after{content:'';position:absolute;top:120px;width:180px;height:240px;background:#fff;border-radius:90px;border:1px solid rgba(0,0,0,.06)}.tee:before{left:-115px;transform:rotate(30deg)}.tee:after{right:-115px;transform:rotate(-30deg)}.neck{position:absolute;top:0;left:50%;transform:translateX(-50%);width:220px;height:110px;background:#fbf6f2;border-radius:0 0 100px 100px;border-left:1px solid rgba(0,0,0,.06);border-right:1px solid rgba(0,0,0,.06);border-bottom:1px solid rgba(0,0,0,.06)}.quote{position:absolute;left:100px;right:100px;top:330px;text-align:center;color:#111;font-weight:800;font-size:72px;line-height:1.12;letter-spacing:.12em;text-transform:uppercase}.brand{position:absolute;bottom:116px;left:0;right:0;text-align:center;color:#c00000;font-size:34px;letter-spacing:.5em;text-transform:uppercase}.sub{position:absolute;bottom:170px;left:0;right:0;text-align:center;color:#666;font-size:20px;letter-spacing:.22em;text-transform:uppercase}</style></head><body><div class="frame"><div class="tee"><div class="neck"></div><div class="quote">Signal<br>over<br>hype.</div><div class="sub">clean front print</div><div class="brand">kovr</div></div></div></body></html>
