<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>kovr quote mockup 1</title><style>body{margin:0;background:#f3f0eb;font-family:Inter,Arial,sans-serif;color:#111} .frame{width:1200px;height:1500px;margin:0 auto;background:linear-gradient(180deg,#f7f3ef,#ece6df);display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}.frame:before{content:'';position:absolute;inset:60px;border:1px solid rgba(0,0,0,.08)} .shirt{width:760px;height:980px;background:#111;border-radius:120px 120px 80px 80px;position:relative;box-shadow:0 40px 120px rgba(0,0,0,.22)} .shirt:before,.shirt:after{content:'';position:absolute;top:120px;width:180px;height:240px;background:#111;border-radius:90px}.shirt:before{left:-115px;transform:rotate(30deg)}.shirt:after{right:-115px;transform:rotate(-30deg)}.neck{position:absolute;top:0;left:50%;transform:translateX(-50%);width:220px;height:110px;background:#f3f0eb;border-radius:0 0 100px 100px}.quote{position:absolute;left:90px;right:90px;top:280px;text-align:center;color:#fff;text-transform:uppercase;letter-spacing:.12em;font-weight:800;font-size:76px;line-height:1.1}.brand{position:absolute;bottom:110px;left:0;right:0;text-align:center;color:#ff7e79;font-size:42px;letter-spacing:.4em;text-transform:uppercase}.note{position:absolute;bottom:36px;left:0;right:0;text-align:center;color:#6f6761;font-size:28px;letter-spacing:.18em;text-transform:uppercase}</style></head><body><div class="frame"><div class="shirt"><div class="neck"></div><div class="quote">Cover<br>the<br>noise.</div><div class="brand">kovr</div></div><div class="note">minimal hero chest print</div></div></body></html>
